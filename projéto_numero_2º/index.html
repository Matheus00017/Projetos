<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloco de notas por Voz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="controls">
        <select id="lang">
            <option value="pt-BR">Português</option>
            <option value="en-US">English</option>
            <option value="es-ES">Espanhol</option>
        </select>

        <button id="btnStart">Começar</button>
        <button id="btnStop">Pausar</button>
        <button id="btnClear">Limpar</button>
        <button id="btnSave">Salvar</button>
    </div>

    <label class="status" id="status">Status: parado</label>
    <textarea id="texto" placeholder="Fale algo para ser escrito"></textarea>
</body>
</html>
