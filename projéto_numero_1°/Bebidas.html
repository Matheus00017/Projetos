    <h1>Bebidas</h1>
    <h2>Bebidas sem álcool</h2>
    <section id="sem-alcool"></section>

    <h2>Bebidas alcoólicas</h2>
    <section id="alcoolicas"></section>

  <script src="js/receitas.js"></script>
  <script>
    function criarCard(receita) {
        let ingredientesHTML = '<div class="ingredientes"><h3>Ingredientes:</h3><ul>';
        receita.ingredientes.forEach(item => {
        ingredientesHTML += `<li>${item}</li>`;
        });
        ingredientesHTML += '</ul></div>';

        let modoPreparoHTML = '<div class="modo-preparo"><h3>Modo de Preparo:</h3><ol>';
        receita.modoPreparo.forEach(passo => {
        modoPreparoHTML += `<li>${passo}</li>`;
        });
        modoPreparoHTML += '</ol></div>';

        return `
          <div class="card">
            <img src="${receita.imagem}" alt="${receita.nome}">
            <h2>${receita.nome}</h2>
            <p><b>Tempo:</b> ${receita.tempoPreparo}</p>
            <p><b>Porções:</b> ${receita.porcoes}</p>
            ${ingredientesHTML}
            ${modoPreparoHTML}
          </div>
        `;
    }
      const semAlcoolContainer = document.getElementById("sem-alcool");
      const alcoolicasContainer = document.getElementById("alcoolicas");

      
      Object.values(receitasBebidas.bebidasSemAlcool).forEach(receita => {
      semAlcoolContainer.innerHTML += criarCard(receita);
      });


      Object.values(receitasBebidas.bebidasAlcoolicas).forEach(receita => {
      alcoolicasContainer.innerHTML += criarCard(receita);
      });
  </script>
