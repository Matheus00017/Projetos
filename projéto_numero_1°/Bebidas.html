    <script>
    function criarCard(receita) {
        let ingredientesHTML = '<div class="ingredientes"><h3>Ingredientes:</h3><ul>';
        receita.ingredientes.forEach(item => {
        ingredientesHTML += `<li>${item}</li>`;
        });
        ingredientesHTML += '</ul></div>';

        // Criar HTML do modo de preparo
        let modoPreparoHTML = '<div class="modo-preparo"><h3>Modo de Preparo:</h3><ol>';
        receita.modoPreparo.forEach(passo => {
        modoPreparoHTML += `<li>${passo}</li>`;
        });
        modoPreparoHTML += '</ol></div>';

        return `
          <div class="card">
            <img src="${receita.imagem}" alt="${receita.nome}">
            <h2>${receita.nome}</h2>
            <p><b>Tempo:</b> ${receita.tempoPreparo}</p>
            <p><b>Porções:</b> ${receita.porcoes}</p>
            ${ingredientesHTML}
            ${modoPreparoHTML}
          </div>
        `;
    }
